hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false

data:
  root: datasets
  name: electricity
  drop_users: []
  date_splits: [0.6, 0.2, 0.2]
  indiv_split: 0.8
  eval_stride: 24

task:
  lags: 168
  horizon: 24

model:
  name: patchtst
  kwargs: {}

normalization:
  name: revin
  kwargs:
    affine: true

training:
  batch_size: 256
  epochs: 1200
  lr: 1e-5
  loss: nmse
  device: gpu

seed: 1

output:
  dir: outputs/revin_ecml/electricity/168_24
  name: patchtst_revin_nmse/seed_1
