defaults:
  - override hydra/job_logging: stdout
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false

data:
  root: datasets
  name: electricity
  # A sibling config.json is loaded automatically. These are additive run-only exclusions.
  config_path: null
  drop_users: []
  date_splits: [0.6, 0.2, 0.2]
  indiv_split: 0.8
  eval_stride: 24

task:
  lags: 168
  horizon: 24

model:
  name: patchtst
  kwargs: {}

normalization:
  name: revin
  kwargs:
    affine: true

training:
  batch_size: 256
  epochs: 10000
  # Optional exact optimizer-step cap. The Slurm profiles set this explicitly.
  steps: null
  lr: 1e-5
  loss: nmse
  device: gpu
  valid_eval_freq: 1000
  logging_eval_freq: 1000
  plot_step_train_loss: false

seed: 1
seeds: null

output:
  dir: outputs/revin_experiment/electricity/168_24
  name: patchtst_revin_nmse
